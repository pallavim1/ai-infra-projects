apiVersion: v1
kind: ServiceAccount
metadata:
  name: sglang-sa
  namespace: default
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-kimi-service-g4
  namespace: default
  labels:
    app: vllm-kimi-g4
spec:
  clusterIP: None
  selector:
    app: vllm-kimi-g4
  ports:
  - name: http-inference
    port: 5002
    targetPort: 5002
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm-kimi-g4
  namespace: default
  labels:
    app: vllm-kimi-g4
spec:
  podManagementPolicy: Parallel
  serviceName: vllm-kimi-service-g4
  replicas: 1
  selector:
    matchLabels:
      app: vllm-kimi-g4
  template:
    metadata:
      labels:
        app: vllm-kimi-g4
      annotations:
        gke-gcsfuse/volumes: "true"
        gke-gcsfuse/cpu-limit: "12"
        gke-gcsfuse/memory-limit: "32Gi"
    spec:
      restartPolicy: Always
      serviceAccountName: sglang-sa
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        cloud.google.com/gke-nodepool: g4-384-np-0
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - vllm-kimi-g4
            topologyKey: kubernetes.io/hostname
      initContainers:
      - name: check-weights
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          set -e
          echo "Listing /models:"
          ls -la /models/ | head -20
          test -f /models/config.json || { echo "ERROR: config.json missing"; exit 1; }
          SHARDS=$(ls /models/*.safetensors 2>/dev/null | wc -l)
          echo "Found $SHARDS safetensors shards"
          test "$SHARDS" -gt 0 || { echo "ERROR: no safetensors found"; exit 1; }
        volumeMounts:
        - { name: models, mountPath: /models, readOnly: true }
      containers:
      - name: vllm-container
        image: voipmonitor/vllm:kimi-k26-mtp-upstream-stack-pcie-env-test-20260424
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
          capabilities:
            add: ["IPC_LOCK", "SYS_PTRACE"]
        ports:
        - containerPort: 5002
          name: http-inference
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        - name: NCCL_SOCKET_IFNAME
          value: "eth0,eth1"
        - name: NCCL_IB_DISABLE
          value: "1"
        - name: NCCL_P2P_LEVEL
          value: "SYS"
        - name: NCCL_SOCKET_NTHREADS
          value: "8"
        - name: NCCL_NSOCKS_PERTHREAD
          value: "8"
        - name: NCCL_MIN_NCHANNELS
          value: "8"
        - name: NCCL_ALLOC_P2P_NET_LL_BUFFERS
          value: "1"
        - name: NCCL_SOCKET_RCVBUF
          value: "8388608"
        - name: NCCL_SOCKET_SNDBUF
          value: "8388608"
        - name: NCCL_BUFFSIZE
          value: "16777216"
        - name: VLLM_ENABLE_PCIE_ALLREDUCE
          value: "1"
        - name: VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS
          value: "1"
        - name: VLLM_TEST_FORCE_FP8_MARLIN
          value: "1"
        - name: VLLM_MARLIN_USE_ATOMIC_ADD
          value: "1"
        - name: VLLM_MARLIN_INPUT_DTYPE
          value: "fp8"
        - name: LD_LIBRARY_PATH
          value: "/usr/local/nvidia/lib64:/usr/local/cuda/lib64:/opt/venv/lib/python3.12/site-packages/nvidia/cuda_runtime/lib"
        command: ["/bin/sh", "-c"]
        args:
        - |
          rm -f /usr/lib/x86_64-linux-gnu/libcuda.so* 2>/dev/null
          ln -sf /usr/local/nvidia/lib64/libcuda.so.1 /usr/lib/x86_64-linux-gnu/libcuda.so.1
          ln -sf /usr/local/nvidia/lib64/libcuda.so.1 /usr/lib/x86_64-linux-gnu/libcuda.so
          exec /opt/venv/bin/vllm serve /models \
            --served-model-name=Kimi-K2.6 \
            --trust-remote-code \
            --host=0.0.0.0 \
            --port=5002 \
            --tensor-parallel-size=8 \
            --pipeline-parallel-size=1 \
            --decode-context-parallel-size=8 \
            --enable-chunked-prefill \
            --enable-prefix-caching \
            --load-format=fastsafetensors \
            --async-scheduling \
            --gpu-memory-utilization=0.94 \
            --max-model-len=262144 \
            --max-num-batched-tokens=8192 \
            --max-num-seqs=128 \
            --mm-processor-cache-gb=0 \
            --mm-encoder-tp-mode=weights \
            --attention-backend=TRITON_MLA \
            --kv-cache-dtype=fp8 \
            --tool-call-parser=kimi_k2 \
            --enable-auto-tool-choice \
            --reasoning-parser=kimi_k2 \
            --speculative-config='{"model":"lightseekorg/kimi-k2.5-eagle3-mla","method":"eagle3","num_speculative_tokens":3,"draft_attention_backend":"TRITON_MLA","draft_kv_cache_dtype":"fp8","rejection_sample_method":"probabilistic"}'
        resources:
          limits:
            nvidia.com/gpu: "8"
        volumeMounts:
        - { name: models,         mountPath: /models, readOnly: true }
        - { name: dshm,           mountPath: /dev/shm }
        - { name: hf-cache,       mountPath: /root/.cache/huggingface }
      volumes:
      - name: models
        csi:
          driver: gcsfuse.csi.storage.gke.io
          readOnly: true
          volumeAttributes:
            bucketName: shivaji-sglang-kimi-us-central1
            mountOptions: "implicit-dirs,only-dir=kimi-k2.6,file-cache:max-size-mb:900000,file-cache:enable-parallel-downloads:true,file-cache:parallel-downloads-per-file:16,file-cache:max-parallel-downloads:-1,file-cache:download-chunk-size-mb:50,file-cache:cache-file-for-range-read:true,metadata-cache:ttl-secs:-1,metadata-cache:stat-cache-max-size-mb:-1,metadata-cache:type-cache-max-size-mb:-1"
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 100Gi
      - name: hf-cache
        hostPath:
          path: /tmp/huggingface
          type: DirectoryOrCreate

