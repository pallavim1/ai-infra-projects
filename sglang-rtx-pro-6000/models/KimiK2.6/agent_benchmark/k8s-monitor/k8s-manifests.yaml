apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-monitor-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-monitor-cluster-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-monitor-cluster-rb
subjects:
- kind: ServiceAccount
  name: k8s-monitor-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: k8s-monitor-cluster-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-monitor-exec-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-monitor-exec-rb
  namespace: default
subjects:
- kind: ServiceAccount
  name: k8s-monitor-sa
  namespace: default
roleRef:
  kind: Role
  name: k8s-monitor-exec-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-monitor
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-monitor
  template:
    metadata:
      labels:
        app: k8s-monitor
    spec:
      serviceAccountName: k8s-monitor-sa
      nodeSelector:
        cloud.google.com/gke-nodepool: large-cpu-pool
      containers:
      - name: app
        image: python:3.9-slim
        command: ["sh", "-c", "python3 -c \"import urllib.request; urllib.request.urlretrieve('https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl', '/tmp/kubectl')\" && chmod +x /tmp/kubectl && python -u /app/server.py"]
        workingDir: /app
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: code
          mountPath: /app
      volumes:
      - name: code
        configMap:
          name: k8s-monitor-code
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-monitor
  namespace: default
spec:
  selector:
    app: k8s-monitor
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
