apiVersion: v1
kind: ServiceAccount
metadata:
  name: sglang-sa
  namespace: default
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-kimi-service
  namespace: default
  labels:
    app: sglang-kimi
spec:
  clusterIP: None
  selector:
    app: sglang-kimi
  ports:
  - name: http-inference
    port: 30000
    targetPort: 30000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sglang-kimi-g4
  namespace: default
  labels:
    app: sglang-kimi
spec:
  podManagementPolicy: Parallel
  serviceName: sglang-kimi-service
  replicas: 2
  selector:
    matchLabels:
      app: sglang-kimi
  template:
    metadata:
      labels:
        app: sglang-kimi
        inference.networking.k8s.io/engine-type: sglang
      annotations:
        gke-gcsfuse/volumes: "true"
        gke-gcsfuse/cpu-limit: "12"
        gke-gcsfuse/memory-limit: "32Gi"
    spec:
      restartPolicy: Always
      serviceAccountName: sglang-sa
      hostNetwork: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        cloud.google.com/gke-nodepool: reflection-g4-pool 
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - sglang-kimi
            topologyKey: kubernetes.io/hostname
      initContainers:
      - name: check-weights
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          set -e
          echo "Listing /models:"
          ls -la /models/ | head -20
          test -f /models/config.json || { echo "ERROR: config.json missing"; exit 1; }
          SHARDS=$(ls /models/*.safetensors 2>/dev/null | wc -l)
          echo "Found $SHARDS safetensors shards"
          test "$SHARDS" -gt 0 || { echo "ERROR: no safetensors found"; exit 1; }
        volumeMounts:
        - { name: models, mountPath: /models, readOnly: true }
      containers:
      - name: sglang-container
        image: docker.io/lmsysorg/sglang:dev-cu13
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
          capabilities:
            add: ["IPC_LOCK", "SYS_PTRACE"]
        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        - name: SGLANG_REQUEST_STATE_WAIT_TIMEOUT
          value: "18000"
        - name: SGLANG_ENABLE_SPEC_V2
          value: "1"
        - name: NCCL_DEBUG
          value: INFO
        - name: NCCL_SOCKET_IFNAME
          value: "eth0,eth1"
        - name: NCCL_IB_DISABLE
          value: "1"
        - name: NCCL_P2P_LEVEL
          value: "SYS"
        - name: NCCL_SOCKET_NTHREADS
          value: "8"
        - name: NCCL_NSOCKS_PERTHREAD
          value: "8"
        - name: NCCL_MIN_NCHANNELS
          value: "8"
        - name: NCCL_ALLOC_P2P_NET_LL_BUFFERS
          value: "1"
        - name: OMP_NUM_THREADS
          value: "24"
        - name: SGLANG_SET_CPU_AFFINITY
          value: "1"
        - name: SAFETENSORS_FAST_GPU
          value: "1"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "expandable_segments:True"
        - name: SGLANG_ENABLE_DEEP_GEMM
          value: "0"
        - name: SGLANG_ENABLE_JIT_DEEPGEMM
          value: "0"
        command: ["python3", "-m", "sglang.launch_server"]
        args:
        - --model-path=/models
        - --tp=8
        - --kv-cache-dtype=fp8_e4m3
        - --trust-remote-code
        - --reasoning-parser=kimi_k2
        - --tool-call-parser=kimi_k2
        - --speculative-algorithm=EAGLE3
        - --speculative-draft-model-path=lightseekorg/kimi-k2.5-eagle3
        - --speculative-num-steps=3
        - --speculative-eagle-topk=1
        - --speculative-num-draft-tokens=4
        - --enable-hierarchical-cache
        - --page-size=64
        - --hicache-ratio=2.0
        - --hicache-io-backend=kernel
        - --hicache-mem-layout=page_first
        - --hicache-write-policy=write_through
        - --hicache-storage-prefetch-policy=timeout
        - --enable-cache-report
        - --enable-metrics
        - --schedule-policy=lpm
        - --schedule-conservativeness=0.3
        - --chunked-prefill-size=16384
        - --enable-mixed-chunk
        - --context-length=131072
        - --max-running-requests=128
        - --mem-fraction-static=0.88
        - --attention-backend=flashinfer
        - --enable-p2p-check
        - --host=0.0.0.0
        - --port=30000
        resources:
          limits:
            nvidia.com/gpu: "8"
        volumeMounts:
        - { name: models,         mountPath: /models, readOnly: true }
        - { name: dshm,           mountPath: /dev/shm }
        - { name: hf-cache,       mountPath: /root/.cache/huggingface }
      volumes:
      - name: models
        csi:
          driver: gcsfuse.csi.storage.gke.io
          readOnly: true
          volumeAttributes:
            bucketName: shivaji-sglang-kimi-us-central1
            mountOptions: "implicit-dirs,only-dir=kimi-k2.6,file-cache:max-size-mb:900000,file-cache:enable-parallel-downloads:true,file-cache:parallel-downloads-per-file:16,file-cache:max-parallel-downloads:-1,file-cache:download-chunk-size-mb:50,file-cache:cache-file-for-range-read:true,metadata-cache:ttl-secs:-1,metadata-cache:stat-cache-max-size-mb:-1,metadata-cache:type-cache-max-size-mb:-1"
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 100Gi
      - name: hf-cache
        hostPath:
          path: /tmp/huggingface
          type: DirectoryOrCreate