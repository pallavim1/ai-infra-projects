apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: distributed-sglang-nvfp4
spec:
  replicas: 2
  selector:
    matchLabels:
      app: distributed-sglang-nvfp4
  serviceName: "sglang-master-pod-nvfp4"
  template:
    metadata:
      labels:
        app: distributed-sglang-nvfp4
    spec:
      containers:
      - name: sglang-container
        image: docker.io/lmsysorg/sglang:v0.5.10.post1
        imagePullPolicy: Always
        command:
        - /bin/bash
        - -c
        args:
        - |
          python3 -m sglang.launch_server \
              --model-path nvidia/Kimi-K2.5-NVFP4 \
              --trust-remote-code \
              --quantization modelopt_fp4 \
              --disable-shared-experts-fusion \
              --mem-fraction-static 0.85 \
              --schedule-policy fcfs \
              --chunked-prefill-size 16384 \
              --nnodes 2 \
              --node-rank $POD_INDEX \
              --dist-init-addr sglang-master-pod-nvfp4:5000 \
              --enable-dp-attention \
              --reasoning-parser kimi_k2 \
              --tool-call-parser kimi_k2 \
              --kv-cache-dtype bfloat16 \
              --dp-size 8 \
              --enable-dp-lm-head \
              --enable-fused-moe-sum-all-reduce \
              --disable-radix-cache \
              --fp4-gemm-backend flashinfer_cutlass \
              --attention-backend flashinfer \
              --moe-runner-backend flashinfer_cutlass \
              --enable-flashinfer-allreduce-fusion \
              --disable-custom-all-reduce \
              --tp-size 8 \
              --pp-size 2 \
              --host 0.0.0.0 \
              --port 8000 

        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        - name: POD_INDEX
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
        - name: NCCL_DEBUG
          value: WARN
        - name: NCCL_SOCKET_IFNAME
          value: "eth0,eth1"
        - name: NCCL_IB_DISABLE
          value: "1"
        - name: NCCL_P2P_LEVEL
          value: "SYS"
        - name: NCCL_SOCKET_NTHREADS
          value: "8"
        - name: NCCL_NSOCKS_PERTHREAD
          value: "8"
        - name: NCCL_MIN_NCHANNELS
          value: "8"
        resources:
          limits:
            nvidia.com/gpu: "8"
          requests:
            nvidia.com/gpu: "8"
        volumeMounts:
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /root/.cache/huggingface
            name: hf-cache
        securityContext:
          privileged: true  
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        cloud.google.com/gke-nodepool: pm-2x-h100-2nic-pool
      tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
      volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 32Gi
        name: dshm
      - name: hf-cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-master-pod-nvfp4
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: distributed-sglang-nvfp4
    apps.kubernetes.io/pod-index: "0"
  ports:
  - name: dist-port
    port: 5000
    targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-serving-nvfp4
spec:
  type: NodePort
  selector:
    app: distributed-sglang-nvfp4
    apps.kubernetes.io/pod-index: "0"
  ports:
  - name: serving
    port: 8000
    targetPort: 8000
  - name: metrics
    port: 8080
    targetPort: 8080
