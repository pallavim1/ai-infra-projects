apiVersion: v1
kind: ServiceAccount
metadata:
  name: sglang-sa
  namespace: default
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: distributed-sglang
spec:
  replicas: 2
  selector:
    matchLabels:
      app: distributed-sglang
  serviceName: "sglang-master-pod"
  template:
    metadata:
      labels:
        app: distributed-sglang
      annotations:
        gke-gcsfuse/volumes: "true"
        gke-gcsfuse/cpu-limit: "12"
        gke-gcsfuse/memory-limit: "32Gi"
        devices.gke.io/container.tcpxo-daemon: |+
          - path: /dev/nvidia0
          - path: /dev/nvidia1
          - path: /dev/nvidia2
          - path: /dev/nvidia3
          - path: /dev/nvidia4
          - path: /dev/nvidia5
          - path: /dev/nvidia6
          - path: /dev/nvidia7
          - path: /dev/nvidiactl
          - path: /dev/nvidia-uvm
          - path: /dev/dmabuf_import_helper
        networking.gke.io/default-interface: 'eth0'
        networking.gke.io/interfaces: |
          [
            {"interfaceName": "eth0", "network": "default"},
            {"interfaceName": "eth1", "network": "vpc-gpunet-1"},
            {"interfaceName": "eth2", "network": "vpc-gpunet-2"},
            {"interfaceName": "eth3", "network": "vpc-gpunet-3"},
            {"interfaceName": "eth4", "network": "vpc-gpunet-4"},
            {"interfaceName": "eth5", "network": "vpc-gpunet-5"},
            {"interfaceName": "eth6", "network": "vpc-gpunet-6"},
            {"interfaceName": "eth7", "network": "vpc-gpunet-7"},
            {"interfaceName": "eth8", "network": "vpc-gpunet-8"}
          ]
    spec:
      serviceAccountName: sglang-sa
      initContainers:
      - name: check-weights
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          set -e
          echo "Listing /models:"
          ls -la /models/ | head -20
          test -f /models/config.json || { echo "ERROR: config.json missing"; exit 1; }
          SHARDS=$(ls /models/*.safetensors 2>/dev/null | wc -l)
          echo "Found $SHARDS safetensors shards"
          test "$SHARDS" -gt 0 || { echo "ERROR: no safetensors found"; exit 1; }
        volumeMounts:
        - mountPath: /models
          name: models
          readOnly: true
      containers:
      - name: tcpxo-daemon
        image: us-docker.pkg.dev/gce-ai-infra/gpudirect-tcpxo/tcpgpudmarxd-dev:v1.0.21
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -ex
          ls -la /dev/ | grep nvidia || echo "No nvidia devices in /dev"
          chmod 755 /fts/entrypoint_rxdm_container.sh
          /fts/entrypoint_rxdm_container.sh --num_hops=2
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_BIND_SERVICE
        volumeMounts:
        - name: nvidia
          mountPath: /usr/local/nvidia/lib64
        - name: sys
          mountPath: /hostsysfs
        - name: proc-sys
          mountPath: /hostprocsysfs
      - name: sglang-container
        image: docker.io/lmsysorg/sglang:v0.5.10.post1
        imagePullPolicy: Always
        command:
        - /bin/bash
        - -c
        args:
        - |
          # Source GKE's official TCPXO environment profile
          export NCCL_LIB_DIR="/usr/local/nvidia/lib64"
          source /usr/local/nvidia/lib64/nccl-env-profile.sh

          python3 -m sglang.launch_server \
              --model-path /models \
              --tensor-parallel-size 8 \
              --pipeline-parallel-size 2 \
              --nnodes 2 \
              --node-rank $POD_INDEX \
              --port 8000 \
              --dist-init-addr distributed-sglang-0.sglang-master-pod:5000 \
              --trust-remote-code \
              --kv-cache-dtype fp8_e5m2 \
              --reasoning-parser kimi_k2 \
              --tool-call-parser kimi_k2 \
              --mem-fraction-static 0.75 \
              --chunked-prefill-size 16384 \
              --host 0.0.0.0 

        env:
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: HF_TOKEN
        - name: POD_INDEX
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
        - name: NCCL_DEBUG
          value: INFO
        - name: NCCL_IB_DISABLE
          value: "0"
        - name: LD_LIBRARY_PATH
          value: "/usr/local/nvidia/lib64"
        - name: NCCL_SOCKET_IFNAME
          value: "eth0"
        - name: NCCL_GPUDIRECTTCPX_FORCE_RX_FILE
          value: "1"
        - name: NCCL_GPUDIRECTTCPX_PROGRAM_FLOW_STEERING_WAIT_MICROS
          value: "1000000"
        - name: NCCL_NET_GDR_LEVEL
          value: "5"
        - name: NCCL_SOCKET_NTHREADS
          value: "8"
        - name: NCCL_NSOCKS_PERTHREAD
          value: "8"
        - name: NCCL_MIN_NCHANNELS
          value: "8"
        - name: NCCL_FASTRAK_CTRL_DEV
          value: "eth0"
        - name: NCCL_FASTRAK_IFNAME
          value: "eth1,eth2,eth3,eth4,eth5,eth6,eth7,eth8"
        - name: NCCL_FASTRAK_LLCM_DEVICE_DIRECTORY
          value: "/dev/aperture_devices"
        resources:
          limits:
            nvidia.com/gpu: "8"
          requests:
            nvidia.com/gpu: "8"
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /root/.cache/huggingface
          name: hf-cache
        - mountPath: /models
          name: models
          readOnly: true
        - mountPath: /dev/aperture_devices
          name: aperture-devices
        securityContext:
          privileged: true  
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        cloud.google.com/gke-nodepool: pallaviam-h100-tcpx-pool
      tolerations:
      - effect: NoSchedule
        key: nvidia.com/gpu
        operator: Exists
      volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 32Gi
        name: dshm
      - name: hf-cache
        emptyDir: {}
      - name: models
        csi:
          driver: gcsfuse.csi.storage.gke.io
          readOnly: true
          volumeAttributes:
            bucketName: pallaviam-sglang-kimi-us-east5
            mountOptions: "implicit-dirs,only-dir=kimi-k2.6,file-cache:max-size-mb:900000,file-cache:enable-parallel-downloads:true,file-cache:parallel-downloads-per-file:16,file-cache:max-parallel-downloads:-1,file-cache:download-chunk-size-mb:50,file-cache:cache-file-for-range-read:true,metadata-cache:ttl-secs:-1,metadata-cache:stat-cache-max-size-mb:-1,metadata-cache:type-cache-max-size-mb:-1"
      - name: nvidia
        hostPath:
          path: /home/kubernetes/bin/nvidia/lib64
      - name: sys
        hostPath:
          path: /sys
      - name: proc-sys
        hostPath:
          path: /proc/sys
      - name: aperture-devices
        hostPath:
          path: /dev/aperture_devices
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-master-pod
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: distributed-sglang
    apps.kubernetes.io/pod-index: "0"
  ports:
  - name: dist-port
    port: 5000
    targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-serving-on-master
spec:
  type: NodePort
  selector:
    app: distributed-sglang
    apps.kubernetes.io/pod-index: "0"
  ports:
  - name: serving
    port: 8000
    targetPort: 8000
  - name: metrics
    port: 8080
    targetPort: 8080
