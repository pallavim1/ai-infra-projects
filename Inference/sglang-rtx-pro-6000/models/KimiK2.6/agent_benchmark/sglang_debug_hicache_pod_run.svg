<svg width="100%" viewBox="0 0 680 515" role="img" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">sglang HiCache debug pod on GKE</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Single Kubernetes pod on a g4-384 node with 8 GPUs. Four volumes are mounted in: GCS-backed model weights, an 8 TiB emptyDir for HiCache, a 100 GiB tmpfs shared memory, and a ConfigMap that patches radix_cache.py. An init container validates the safetensors shards, then the sglang server launches with TP=8, EAGLE3 speculative decoding, and a hierarchical cache configured for kernel IO and page-first layout.</desc>
