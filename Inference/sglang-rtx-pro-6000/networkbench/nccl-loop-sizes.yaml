apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: netdev-claim-template
spec:
  spec:
    devices:
      requests:
      - name: netdev-request
        exactly:
          deviceClassName: netdev.google.com
          allocationMode: ExactCount
          count: 2 # Allocate both physical 200G Diorite SmartNICs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nccl-loop-sizes-script
data:
  loop_sizes_test.py: |
    import torch
    import torch.distributed as dist
    import os
    import time

    def main():
        os.environ["NCCL_SOCKET_IFNAME"] = "eth1,eth2" # Use both interfaces
        os.environ["NCCL_DEBUG"] = "INFO"
        os.environ["NCCL_CROSS_NIC"] = "1"

        dist.init_process_group(backend="nccl")
        rank = dist.get_rank()
        world_size = dist.get_world_size()
        
        device_index = rank % torch.cuda.device_count()
        device = torch.device(f"cuda:{device_index}")
        
        # Loop from 256MB to 2GB (in bytes)
        # float32 takes 4 bytes.
        # 256MB = 64M elements.
        # 2GB = 512M elements.
        sizes_elements = [
            64 * 1024 * 1024,   # 256 MB
            128 * 1024 * 1024,  # 512 MB
            256 * 1024 * 1024,  # 1 GB
            512 * 1024 * 1024   # 2 GB
        ]
        
        if rank == 0:
            print(f"=== NCCL ALLREDUCE BENCHMARK (MULTIPLE SIZES) ===")
            print(f"{'Size (MB)':>10} | {'Time (us)':>12} | {'AlgBW (GB/s)':>12}")
            print("-" * 45)
            
        for elements in sizes_elements:
            # Reallocate tensor for each size to be safe with memory
            tensor = torch.ones(elements, dtype=torch.float32, device=device) * (rank + 1)
            
            # Warmup (3 iterations as requested)
            for _ in range(3):
                dist.all_reduce(tensor)
                torch.cuda.synchronize()
                
            start = time.time()
            for _ in range(30): # 30 iterations as requested
                dist.all_reduce(tensor)
                torch.cuda.synchronize()
            end = time.time()
            
            duration = end - start
            avg_time_us = (duration / 30) * 1e6
            bytes_transferred = elements * 4 * 2 # For AllReduce (send + recv effect)
            algbw_gbps = (bytes_transferred / (avg_time_us / 1e6)) / 1e9
            
            if rank == 0:
                size_mb = elements * 4 / 1024 / 1024
                print(f"{size_mb:10.1f} | {avg_time_us:12.2f} | {algbw_gbps:12.2f}")
                
            # Free memory
            del tensor
            torch.cuda.empty_cache()
                
        dist.destroy_process_group()

    if __name__ == "__main__":
        main()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nccl-loop-sizes
  labels:
    app: nccl-loop-sizes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nccl-loop-sizes
  template:
    metadata:
      labels:
        app: nccl-loop-sizes
    spec:
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: cloud.google.com/gke-nodepool
                operator: In
                values:
                - chavoshi-v10-pool
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - nccl-loop-sizes
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: nccl-chamber
        image: docker.io/lmsysorg/sglang:v0.5.12-cu130
        env:
        - name: NCCL_IB_DISABLE
          value: "1"
        - name: NCCL_SOCKET_FAMILY
          value: "AF_INET"
        - name: NCCL_MIN_NCHANNELS
          value: "8"
        - name: NCCL_SOCKET_NTHREADS
          value: "8"
        - name: NCCL_NSOCKS_PERTHREAD
          value: "4"
        - name: NCCL_P2P_LEVEL
          value: "SYS"
        - name: NCCL_SOCKET_RCVBUF
          value: "8388608"
        - name: NCCL_SOCKET_SNDBUF
          value: "8388608"
        - name: NCCL_BUFFSIZE
          value: "16777216"
        - name: NCCL_PROTO
          value: "Simple"
        securityContext:
          privileged: true
          capabilities:
            add: ["NET_ADMIN", "IPC_LOCK", "SYS_PTRACE"]
        command: ["/bin/bash", "-c"]
        args:
        - |
          apt update && apt install -y iproute2 net-tools
          sleep 3600
        resources:
          limits:
            nvidia.com/gpu: "8" # Request all 8 GPUs
          requests:
            nvidia.com/gpu: "8"
          claims:
          - name: netdev-claim
        volumeMounts:
        - name: script-volume
          mountPath: /root
        - name: dshm
          mountPath: /dev/shm
      resourceClaims:
      - name: netdev-claim
        resourceClaimTemplateName: netdev-claim-template
      volumes:
      - name: script-volume
        configMap:
          name: nccl-loop-sizes-script
      - name: dshm
        hostPath:
          path: /dev/shm
